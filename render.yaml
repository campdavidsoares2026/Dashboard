services:
  - type: web
    name: cpee-dashboard-api
    runtime: python
    pythonVersion: 3.11
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: META_ACCESS_TOKEN
        sync: false
      - key: META_AD_ACCOUNT_IDS
        value: act_4085311614896655,act_1601727050926069,act_2360668901089815
      - key: MODO_COLETA
        value: real
      - key: API_PORT
        value: 8000
      - key: REFRESH_INTERVAL
        value: 1800
      - key: CORS_ORIGIN
        value: https://dashboard-prod-six.vercel.app
      - key: EXPORT_API_KEY
        sync: false
