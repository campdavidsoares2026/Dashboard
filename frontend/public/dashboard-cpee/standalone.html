  {
    account_id: "act_003",
    nome: "Piloto Auto · Belo Horizonte",
    regiao: "MG",
    base_spend: 2700,
    base_cpee: 36.0,
    ctr_base: 0.0155,
    cpm_base: 46,
    lead_rate: 0.28,
    meta_mensal: 82000,
    budget_diario: 3000,
  },
];

// ─── Daily snapshot generator ─────────────────────────────────────
function buildDailyData() {
  const out = [];
  for (let acctIdx = 0; acctIdx < ACCOUNTS.length; acctIdx++) {
    const a = ACCOUNTS[acctIdx];
    const rng = mulberry32(42 + acctIdx * 31);
    // Trend factor: slight improvement for SP, flat for RJ, deteriorating for MG
    const trendDir = [-0.0015, 0.0003, 0.0022][acctIdx];
    let cpeeWalk = a.base_cpee - trendDir * TOTAL_DAYS * 0.5;

    for (let i = 0; i < TOTAL_DAYS; i++) {
      const d = new Date(START);
      d.setUTCDate(d.getUTCDate() + i);
      const dow = d.getUTCDay();
      const weekendMod = (dow === 0 || dow === 6) ? 0.85 : 1.0;
      const dom = d.getUTCDate();
      const monthMod = 0.92 + 0.08 * Math.sin((dom / 30) * Math.PI);

      const noise = 0.88 + rng() * 0.24;
      const spend = Math.round(a.base_spend * noise * weekendMod * monthMod);

      cpeeWalk += trendDir + (rng() - 0.5) * 0.45;
      const cpee = Math.max(14, cpeeWalk);

      const impressoes = Math.round(spend / a.cpm_base * 1000 * (0.94 + rng() * 0.12));
      const alcance = Math.round(impressoes / (1.6 + rng() * 0.5));
      const cliques = Math.round(impressoes * a.ctr_base * (0.9 + rng() * 0.2));
      const eq = Math.max(1, Math.round(spend / cpee));
      const leads = Math.max(0, Math.round(eq * a.lead_rate * (0.85 + rng() * 0.3)));
      const ctr = impressoes > 0 ? (cliques / impressoes) * 100 : 0;
      const cpc = cliques > 0 ? spend / cliques : 0;
      const cpm = impressoes > 0 ? (spend / impressoes) * 1000 : 0;
      const cpl = leads > 0 ? spend / leads : 0;

      out.push({
        data: d.toISOString().slice(0, 10),
        account_id: a.account_id,
        regiao: a.regiao,
        spend,
        impressoes,
        alcance,
        cliques,
        eq,
        leads,
        ctr,
        cpc,
        cpm,
        cpl,
        cpee,
      });
    }
  }
  return out;
}

const DAILY = buildDailyData();

// ─── Aggregations ─────────────────────────────────────────────────
// Classification is RELATIVE to the period average (quente = below avg = good)
function classifyCpee(cpee, avgCpee) {
  if (!cpee || cpee <= 0) return "COLD";
  if (!avgCpee || avgCpee <= 0) return "WARM";
  if (cpee <= avgCpee * 0.85) return "HOT";
  if (cpee <= avgCpee * 1.15) return "WARM";
  return "COLD";
}

// Aggregate over a date range (inclusive) — returns per-account + totals
// daily: array of per-day-per-account rows
// accounts: array of account metadata
function aggregate(daily, accounts, startISO, endISO, accountId = null) {
  const filter = (r) => r.data >= startISO && r.data <= endISO && (!accountId || r.account_id === accountId);
  const rows = (daily || []).filter(filter);
  const acctsList = accounts || [];

  // per-account aggregation
  const byAcct = new Map();
  for (const r of rows) {
    if (!byAcct.has(r.account_id)) {
      byAcct.set(r.account_id, {
        account_id: r.account_id,
        spend: 0, impressoes: 0, alcance: 0, cliques: 0, eq: 0, leads: 0,
      });
    }
    const acc = byAcct.get(r.account_id);
    acc.spend += r.spend || 0;
    acc.impressoes += r.impressoes || 0;
    acc.alcance += r.alcance || 0;
    acc.cliques += r.cliques || 0;
    acc.eq += r.eq || 0;
    acc.leads += r.leads || 0;
  }

  // compute derived per-account (without classification — needs avg first)
  const perAccountRaw = [...byAcct.values()].map((acc) => {
    const a = acctsList.find((x) => x.account_id === acc.account_id) || {};
    // CPEE = spend / clicks (cliques). Fall back to eq if no clicks data.
    const cpee = acc.cliques > 0 ? acc.spend / acc.cliques : (acc.eq > 0 ? acc.spend / acc.eq : 0);
    return {
      ...acc,
      nome: a.nome || acc.account_id,
      regiao: a.regiao || "—",
      meta_mensal: a.meta_mensal || 0,
      budget_diario: a.budget_diario || 0,
      campanhas_ativas: a.campanhas_ativas || { SP: 7, RJ: 5, MG: 6 }[a.regiao] || 0,
      cpee,
      ctr: acc.impressoes > 0 ? (acc.cliques / acc.impressoes) * 100 : 0,
      cpc: acc.cliques > 0 ? acc.spend / acc.cliques : 0,
      cpm: acc.impressoes > 0 ? (acc.spend / acc.impressoes) * 1000 : 0,
      cpl: acc.leads > 0 ? acc.spend / acc.leads : 0,
      frequencia: acc.alcance > 0 ? acc.impressoes / acc.alcance : 0,
    };
  });

  // totals (needed for relative classification)
  const totals = perAccountRaw.reduce(
    (a, b) => ({
      spend: a.spend + b.spend,
      impressoes: a.impressoes + b.impressoes,
      alcance: a.alcance + b.alcance,
      cliques: a.cliques + b.cliques,
      eq: a.eq + b.eq,
      leads: a.leads + b.leads,
    }),
    { spend: 0, impressoes: 0, alcance: 0, cliques: 0, eq: 0, leads: 0 }
  );
  // CPEE total = spend / clicks (same formula)
  totals.cpee = totals.cliques > 0 ? totals.spend / totals.cliques : (totals.eq > 0 ? totals.spend / totals.eq : 0);
  totals.ctr = totals.impressoes > 0 ? (totals.cliques / totals.impressoes) * 100 : 0;
  totals.cpc = totals.cliques > 0 ? totals.spend / totals.cliques : 0;
  totals.cpm = totals.impressoes > 0 ? (totals.spend / totals.impressoes) * 1000 : 0;
  totals.cpl = totals.leads > 0 ? totals.spend / totals.leads : 0;
  totals.frequencia = totals.alcance > 0 ? totals.impressoes / totals.alcance : 0;
  totals.classificacao_cpee = classifyCpee(totals.cpee, totals.cpee); // totals is the baseline → WARM

  // classify each account relative to the period average
  const avgCpee = totals.cpee;
  const perAccount = perAccountRaw.map((acc) => ({
    ...acc,
    classificacao_cpee: classifyCpee(acc.cpee, avgCpee),
  }));

  // daily series (totals + per-account)
  const dailyMap = new Map();
  for (const r of rows) {
    if (!dailyMap.has(r.data)) dailyMap.set(r.data, []);
    dailyMap.get(r.data).push(r);
  }
  const dailySeries = [...dailyMap.entries()]
    .sort(([a], [b]) => (a < b ? -1 : 1))
    .map(([data, list]) => {
      const sum = list.reduce(
        (a, b) => ({
          spend: a.spend + (b.spend || 0),
          eq: a.eq + (b.eq || 0),
          leads: a.leads + (b.leads || 0),
          impressoes: a.impressoes + (b.impressoes || 0),
          cliques: a.cliques + (b.cliques || 0),
        }),
        { spend: 0, eq: 0, leads: 0, impressoes: 0, cliques: 0 }
      );
      sum.cpee = sum.cliques > 0 ? sum.spend / sum.cliques : (sum.eq > 0 ? sum.spend / sum.eq : 0);
      sum.cpl = sum.leads > 0 ? sum.spend / sum.leads : 0;
      sum.ctr = sum.impressoes > 0 ? (sum.cliques / sum.impressoes) * 100 : 0;
      return { data, ...sum, byAccount: list };
    });

  // monthly target progress (calendar month containing the END date)
  const endDate = new Date(endISO + "T00:00:00Z");
  const monthStart = new Date(Date.UTC(endDate.getUTCFullYear(), endDate.getUTCMonth(), 1));
  const monthEnd = new Date(Date.UTC(endDate.getUTCFullYear(), endDate.getUTCMonth() + 1, 0));
  const monthRows = (daily || []).filter((r) => {
    const d = new Date(r.data + "T00:00:00Z");
    return d >= monthStart && d <= endDate && (!accountId || r.account_id === accountId);
  });
  const monthSpend = monthRows.reduce((a, b) => a + (b.spend || 0), 0);
  const monthMeta = accountId
    ? (acctsList.find((a) => a.account_id === accountId)?.meta_mensal || 0)
    : acctsList.reduce((a, b) => a + (b.meta_mensal || 0), 0);
  const monthDaysElapsed = Math.round((endDate - monthStart) / (1000 * 60 * 60 * 24)) + 1;
  const monthDaysTotal = Math.round((monthEnd - monthStart) / (1000 * 60 * 60 * 24)) + 1;
  const monthProgress = monthMeta > 0 ? monthSpend / monthMeta : 0;
  const monthExpected = monthDaysElapsed / monthDaysTotal;

  // delta vs equivalent previous period
  const prevEnd = new Date(new Date(startISO + "T00:00:00Z").getTime() - 86400000);
  const prevStart = new Date(prevEnd.getTime() - (new Date(endISO + "T00:00:00Z") - new Date(startISO + "T00:00:00Z")));
  const prevRows = (daily || []).filter((r) => {
    const d = new Date(r.data + "T00:00:00Z");
    return d >= prevStart && d <= prevEnd && (!accountId || r.account_id === accountId);
  });
  const prevSpend = prevRows.reduce((a, b) => a + (b.spend || 0), 0);
  const prevEq = prevRows.reduce((a, b) => a + (b.eq || 0), 0);
  const prevLeads = prevRows.reduce((a, b) => a + (b.leads || 0), 0);
  const prevImpr = prevRows.reduce((a, b) => a + (b.impressoes || 0), 0);
  const prevAlc = prevRows.reduce((a, b) => a + (b.alcance || 0), 0);
  const prevCli = prevRows.reduce((a, b) => a + (b.cliques || 0), 0);
  const prevCpee = prevCli > 0 ? prevSpend / prevCli : (prevEq > 0 ? prevSpend / prevEq : 0);
  const prevCtr = prevImpr > 0 ? (prevCli / prevImpr) * 100 : 0;
  const prevCpl = prevLeads > 0 ? prevSpend / prevLeads : 0;
  const prevFreq = prevAlc > 0 ? prevImpr / prevAlc : 0;

  const deltaPct = (curr, prev) => prev > 0 ? ((curr - prev) / prev) * 100 : 0;

  return {
    perAccount,
    totals,
    dailySeries,
    monthly: {
      spend: monthSpend,
      meta: monthMeta,
      progress: monthProgress,
      expected: monthExpected,
      daysElapsed: monthDaysElapsed,
      daysTotal: monthDaysTotal,
    },
    deltas: {
      spend: deltaPct(totals.spend, prevSpend),
      eq: deltaPct(totals.eq, prevEq),
      leads: deltaPct(totals.leads, prevLeads),
      impressoes: deltaPct(totals.impressoes, prevImpr),
      alcance: deltaPct(totals.alcance, prevAlc),
      cliques: deltaPct(totals.cliques, prevCli),
      cpee: deltaPct(totals.cpee, prevCpee),
      ctr: deltaPct(totals.ctr, prevCtr),
      cpl: deltaPct(totals.cpl, prevCpl),
      frequencia: deltaPct(totals.frequencia, prevFreq),
    },
  };
}

function rangeFromPreset(presetId, customStart, customEnd) {
  const fmt = (d) => d.toISOString().slice(0, 10);
  if (presetId === "ytd") {
    return { start: "2026-01-01", end: fmt(TODAY) };

  const s = new Date(TODAY);
  s.setUTCDate(s.getUTCDate() - (days - 1));

}

// ───────────────────────────── Distribuição CPEE Gauge ─────────────────────────────
function DistribuicaoCpee({ cpee, target = 28, warmRange = 4 }) {
  const max = Math.max(target * 2, 50);
  const norm = Math.min(1, Math.max(0, cpee / max));
  // angle: -90° at left, 0° at top, +90° at right
  const angle = -90 + norm * 180;

  // Classification thresholds
  const hotMax = target - warmRange / 2; // <= hotMax = HOT
  const warmMax = target + warmRange / 2; // <= warmMax = WARM
  let kind, statusLabel, statusColor;
  if (cpee <= hotMax) {
    kind = "hot"; statusLabel = "Saudável"; statusColor = "var(--accent-success)";
  } else if (cpee <= warmMax) {
    kind = "warm"; statusLabel = "Alerta"; statusColor = "var(--accent-warm)";
  } else {
    kind = "cold"; statusLabel = "Crítico"; statusColor = "var(--accent-hot)";
  }

  // SVG arc geometry
  const cx = 120, cy = 110, r = 80;
  const sweep = (a) => {
    const rad = (a - 90) * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  };
  const arc = (a1, a2, color) => {
    const [x1, y1] = sweep(a1);
    const [x2, y2] = sweep(a2);
    const large = Math.abs(a2 - a1) > 180 ? 1 : 0;
    return <path d={`M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`} stroke={color} strokeWidth="16" fill="none" strokeLinecap="butt" />;
  };

  // Segment boundaries (in degrees, -90 at left to +90 at right)
  const a1 = -90;
  const a2 = -90 + (hotMax / max) * 180;
  const a3 = -90 + (warmMax / max) * 180;
  const a4 = 90;

  // Needle endpoints
  const needleRad = (angle - 90) * Math.PI / 180;
  const needleEnd = [cx + (r - 4) * Math.cos(needleRad), cy + (r - 4) * Math.sin(needleRad)];

  return (
    <div className="card gauge-card">
      <div className="card-head">
        <div>
          <h3 className="card-title">Distribuição CPEE</h3>
          <p className="card-sub">Saúde consolidada · meta R$ {target.toFixed(0)}</p>
        </div>
      </div>
      <div className="gauge-wrap">
        <svg viewBox="0 0 240 150" className="gauge-svg">
          {/* arc segments — green/yellow/red (left to right semantic mapping)
              left side (low CPEE) = HOT = green = good */}
          {arc(a1, a2, "var(--accent-success)")}
          {arc(a2, a3, "var(--accent-warm)")}
          {arc(a3, a4, "var(--accent-hot)")}

          {/* tick marks */}
          {[a2, a3].map((a, i) => {
            const [tx1, ty1] = sweep(a);
            const rad = (a - 90) * Math.PI / 180;
            const tx2 = cx + (r + 10) * Math.cos(rad);
            const ty2 = cy + (r + 10) * Math.sin(rad);
            return <line key={i} x1={tx1} y1={ty1} x2={tx2} y2={ty2} stroke="var(--text-tertiary)" strokeWidth="1.5" />;
          })}

          {/* threshold labels */}
          <text x={sweep(a2)[0]} y={sweep(a2)[1] - 14} textAnchor="middle" className="gauge-tick">R$ {hotMax.toFixed(0)}</text>
          <text x={sweep(a3)[0]} y={sweep(a3)[1] - 14} textAnchor="middle" className="gauge-tick">R$ {warmMax.toFixed(0)}</text>

          {/* needle */}
          <line
            x1={cx} y1={cy}
            x2={needleEnd[0]} y2={needleEnd[1]}
            stroke="var(--text-primary)"
            strokeWidth="2.5"
            strokeLinecap="round"
            style={{ transition: "all 0.5s cubic-bezier(.4,1.4,.6,1)" }}
          />
          <circle cx={cx} cy={cy} r="6" fill="var(--bg-card-hi)" stroke="var(--text-primary)" strokeWidth="2" />
          <circle cx={cx} cy={cy} r="2.5" fill="var(--text-primary)" />
        </svg>
        <div className="gauge-status">
          <span className="gauge-status-badge" style={{ color: statusColor, background: `color-mix(in oklch, ${statusColor} 16%, transparent)`, borderColor: `color-mix(in oklch, ${statusColor} 50%, transparent)` }}>
            {statusLabel}
          </span>
          <div className="gauge-value">{BRLfine(cpee)}</div>
          <div className="gauge-value-label">CPEE Médio</div>
        </div>
      </div>
    </div>
  );
}

// ───────────────────────────── Classificação CPEE ─────────────────────────────
function ClassificacaoCpee({ perAccount }) {
  const counts = { HOT: 0, WARM: 0, COLD: 0 };
  perAccount.forEach((a) => counts[a.classificacao_cpee]++);
  const total = perAccount.length || 1;

// ───────────────────────────── Funil de Conversão ─────────────────────────────
function FunilConversao({ totals }) {
  const steps = [
    { key: "alcance", label: "Alcance", value: totals.alcance, hint: "Pessoas únicas atingidas" },
    { key: "impressoes", label: "Impressões", value: totals.impressoes, hint: "Total exibido" },
    { key: "eq", label: "Engajamento (EQ)", value: totals.eq, hint: "Engajamento qualificado" },
    { key: "cliques", label: "Cliques (est.)", value: totals.cliques, hint: "Tráfego para LP" },
    { key: "leads", label: "Leads", value: totals.leads, hint: "Conversões" },
  ];
  const max = Math.max(...steps.map((s) => s.value));
  return (
    <div className="card funnel-card">
      <div className="card-head">
        <div>
          <h3 className="card-title">Funil de Conversão</h3>
          <p className="card-sub">Soma do período · 3 contas</p>
        </div>
      </div>
      <div className="funnel">
        {steps.map((s, i) => {
          const width = (s.value / max) * 100;
          const prev = i > 0 ? steps[i - 1].value : null;
          const dropPct = prev ? ((s.value / prev) * 100) : 100;
          return (
            <div className="funnel-step" key={s.key}>
              <div className="funnel-step-row">
                <div className="funnel-step-label">
                  <span className="funnel-step-name">{s.label}</span>
                  <span className="funnel-step-hint">{s.hint}</span>
                </div>
                <div className="funnel-step-value">
                  <span className="funnel-step-num">{NUM(s.value)}</span>
                  {i > 0 && (
                    <span className="funnel-step-rate">{dropPct.toFixed(1)}%</span>
                  )}
                </div>
              </div>
              <div className="funnel-bar">
                <div className="funnel-bar-fill" style={{ width: `${width}%` }} />
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ───────────────────────────── Performance Table ─────────────────────────────
function PerformanceTable({ data, onSelect, selectedId }) {
  const [sortBy, setSortBy] = useState("spend");
  const [dir, setDir] = useState("desc");
  const sorted = useMemo(() => {
    const x = [...data].sort((a, b) => {
      const av = a[sortBy] ?? 0;
      const bv = b[sortBy] ?? 0;
      return dir === "desc" ? bv - av : av - bv;
    });
    return x;
  }, [data, sortBy, dir]);

  const head = (key, label, align = "right") => (
    <th
      style={{ textAlign: align, cursor: "pointer" }}
      onClick={() => {
        if (sortBy === key) setDir(dir === "desc" ? "asc" : "desc");
        else { setSortBy(key); setDir("desc"); }
      }}
    >
      <span className="th-label">
        {label}
        <span className="th-caret">{sortBy === key ? (dir === "desc" ? "▾" : "▴") : ""}</span>
      </span>
    </th>
  );

  return (
    <div className="card table-card">
      <div className="card-head">
        <div>
          <h3 className="card-title">Performance por Conta</h3>
          <p className="card-sub">{data.length} contas ativas · soma do período</p>
        </div>
      </div>
      <table className="perf-table">
        <thead>
          <tr>
            {head("nome", "Conta", "left")}
            {head("cpee", "CPEE")}
            {head("spend", "Gasto")}
            {head("eq", "EQ")}
            {head("impressoes", "Impr.")}
            {head("ctr", "CTR")}
            {head("cpc", "CPC")}
            <th style={{ textAlign: "center" }}>Status</th>
          </tr>
        </thead>
        <tbody>
          {sorted.map((row) => {
            const active = row.account_id === selectedId;
            return (
              <tr
                key={row.account_id}
                className={cn(active && "row-active")}
                onClick={() => onSelect?.(row.account_id)}
              >
                <td>
                  <div className="acct">
                    <span className={`acct-dot acct-${row.regiao}`}>{row.regiao}</span>
                    <div>
                      <div className="acct-name">{row.nome}</div>
                      <div className="acct-meta">{row.campanhas_ativas} campanhas · meta {BRL(row.meta_mensal)}</div>
                    </div>

                  <div className="num-main">{BRLfine(row.cpee)}</div>
                </td>
                <td style={{ textAlign: "right" }}>
                  <div className="num-main">{BRL(row.spend)}</div>
                </td>
                <td style={{ textAlign: "right" }}>

                  <div className="num-main">{NUMcompact(row.impressoes)}</div>
                </td>
                <td style={{ textAlign: "right" }}>{row.ctr.toFixed(2)}%</td>

                <td style={{ textAlign: "center" }}><StatusBadge kind={row.classificacao_cpee}>{row.classificacao_cpee}</StatusBadge></td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );

// ───────────────────────────── Trend Chart ─────────────────────────────
const CHART_PALETTE = [
  "#3B82F6", "#F59E0B", "#EF4444", "#10B981", "#8B5CF6",
  "#06B6D4", "#F97316", "#EC4899", "#84CC16", "#14B8A6",
  "#A78BFA", "#FB923C", "#34D399", "#60A5FA", "#FBBF24",
  "#F472B6", "#4ADE80", "#38BDF8",
];

function TrendChart({ dailySeries, metric, accounts, selectedAccount }) {
  const days = dailySeries.map((d) => d.data);

  // Stable color assignment by account_id order
  const colorMap = useMemo(() => {
    const map = {};
    accounts.forEach((a, i) => { map[a.account_id] = CHART_PALETTE[i % CHART_PALETTE.length]; });
    return map;
  }, [accounts]);

  const colorFor = (account_id) => colorMap[account_id] || CHART_PALETTE[0];

  // Abbreviate account name for legend: "Piloto Auto · São Paulo" → "São Paulo"
  const shortName = (nome) => {
    const parts = nome.split(/[·\-–]/);
    return (parts[parts.length - 1] || nome).trim();
  };

  const series = useMemo(() => {
    const list = selectedAccount
      ? accounts.filter((a) => a.account_id === selectedAccount)
      : accounts;
    return list.map((a) => {
      const points = dailySeries.map((d) => {
        const row = d.byAccount.find((r) => r.account_id === a.account_id);
        return row ? row[metric] : null;
      });
      return { ...a, points };
    });
  }, [dailySeries, metric, accounts, selectedAccount]);

  const W = 900;
  const H = 240;
  const padL = 56, padR = 24, padT = 16, padB = 32;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const allVals = series.flatMap((s) => s.points.filter((v) => v !== null));
  const min = Math.min(...allVals);
  const max = Math.max(...allVals);
  const padY = (max - min) * 0.15 || 1;
  const yMin = metric === "cpee" ? Math.max(0, min - padY) : 0;
  const yMax = max + padY;
  const stepX = days.length > 1 ? innerW / (days.length - 1) : 0;

  const xy = (i, v) => [padL + i * stepX, padT + innerH - ((v - yMin) / (yMax - yMin)) * innerH];

  const grid = [0, 0.25, 0.5, 0.75, 1].map((p) => ({
    y: padT + innerH * p,
    v: yMax - (yMax - yMin) * p,
  }));

  const labelEvery = Math.max(1, Math.floor(days.length / 7));
  const xLabels = days.map((d, i) => ({
    x: padL + i * stepX,
    d,
    show: i === 0 || i === days.length - 1 || i % labelEvery === 0,
  }));

  const fmt = (v) => metric === "cpee" || metric === "cpl"
    ? BRLfine(v)
    : metric === "spend"
      ? BRL(v)
      : NUMcompact(Math.round(v));

  const target = metric === "cpee" ? 28 : null;
  const [hoverIdx, setHoverIdx] = useState(null);

  return (
    <div className="card chart-card">
      <div className="card-head">
        <div>
          <h3 className="card-title">Tendência diária</h3>
          <p className="card-sub">
            {selectedAccount ? accounts.find((a) => a.account_id === selectedAccount)?.nome : "Todas as contas"}
            {" · "}
            {days.length} dias
          </p>
        </div>
        <div className="legend" style={{ flexWrap: "wrap", gap: "4px 12px", maxWidth: 460 }}>
          {series.map((s) => (
            <div className="legend-item" key={s.account_id} title={s.nome}>
              <span className="legend-swatch" style={{ background: colorFor(s.account_id) }} />
              <span>{shortName(s.nome)}</span>
            </div>
          ))}
        </div>
      </div>

      <svg
        viewBox={`0 0 ${W} ${H}`}
        className="chart-svg"
        onMouseLeave={() => setHoverIdx(null)}
        onMouseMove={(e) => {
          const rect = e.currentTarget.getBoundingClientRect();
          const px = ((e.clientX - rect.left) / rect.width) * W;
          const i = Math.round((px - padL) / stepX);
          if (i >= 0 && i < days.length) setHoverIdx(i);
        }}
      >
        {grid.map((g, i) => (
          <g key={i}>
            <line x1={padL} x2={W - padR} y1={g.y} y2={g.y} stroke="var(--border-divider)" strokeDasharray="2 4" strokeOpacity="0.6" />
            <text x={padL - 10} y={g.y + 4} textAnchor="end" className="axis-tick">{fmt(g.v)}</text>
          </g>
        ))}

        {target && target >= yMin && target <= yMax && (
          <g>
            <line
              x1={padL} x2={W - padR}
              y1={padT + innerH - ((target - yMin) / (yMax - yMin)) * innerH}
              y2={padT + innerH - ((target - yMin) / (yMax - yMin)) * innerH}
              stroke="var(--accent-success)" strokeDasharray="4 4" strokeOpacity="0.6"
            />
            <text
              x={W - padR}
              y={padT + innerH - ((target - yMin) / (yMax - yMin)) * innerH - 6}
              textAnchor="end"
              className="axis-tick"
              style={{ fill: "var(--accent-success)" }}
            >
              Meta · {fmt(target)}
            </text>
          </g>
        )}

        {xLabels.map((l, i) => l.show && (
          <text key={i} x={l.x} y={H - 10} textAnchor="middle" className="axis-tick">
            {new Date(l.d + "T00:00:00Z").toLocaleDateString("pt-BR", { day: "2-digit", month: "short", timeZone: "UTC" })}
          </text>
        ))}

        {series.map((s) => {
          const color = colorFor(s.account_id);
          const validPts = s.points.map((v, i) => v == null ? null : [i, v]).filter(Boolean);
          if (validPts.length === 0) return null;

          // Build path segments (skip gaps where value is null)
          let path = "";
          let areaPath = "";
          let segStart = null;
          validPts.forEach(([i, v], idx) => {
            const [x, y] = xy(i, v);
            const isFirst = idx === 0 || validPts[idx - 1][0] !== i - 1;
            if (isFirst) {
              if (segStart !== null) {
                const [prevI, prevV] = validPts[idx - 1];
                const [px] = xy(prevI, prevV);
                areaPath += ` L ${px.toFixed(1)} ${(padT + innerH).toFixed(1)} L ${xy(segStart, validPts.find(p => p[0] === segStart)[1])[0].toFixed(1)} ${(padT + innerH).toFixed(1)} Z`;
              }
              path += ` M ${x.toFixed(1)} ${y.toFixed(1)}`;
              areaPath += ` M ${x.toFixed(1)} ${(padT + innerH).toFixed(1)} L ${x.toFixed(1)} ${y.toFixed(1)}`;
              segStart = i;
            } else {
              path += ` L ${x.toFixed(1)} ${y.toFixed(1)}`;
              areaPath += ` L ${x.toFixed(1)} ${y.toFixed(1)}`;
            }
          });
          if (segStart !== null) {
            const last = validPts[validPts.length - 1];
            const [lx] = xy(last[0], last[1]);
            const firstInSeg = validPts.find(p => p[0] === segStart);
            const [fx] = xy(segStart, firstInSeg[1]);
            areaPath += ` L ${lx.toFixed(1)} ${(padT + innerH).toFixed(1)} L ${fx.toFixed(1)} ${(padT + innerH).toFixed(1)} Z`;
          }

          const id = `grad-${s.account_id.replace(/[^a-zA-Z0-9]/g, "")}`;
          return (
            <g key={s.account_id}>
              <defs>
                <linearGradient id={id} x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stopColor={color} stopOpacity="0.15" />
                  <stop offset="100%" stopColor={color} stopOpacity="0" />
                </linearGradient>
              </defs>
              <path d={areaPath} fill={`url(#${id})`} />
              <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
              {hoverIdx !== null && s.points[hoverIdx] != null && (
                <circle
                  key={`${s.account_id}-hover`}
                  cx={xy(hoverIdx, s.points[hoverIdx])[0]}
                  cy={xy(hoverIdx, s.points[hoverIdx])[1]}
                  r={4}
                  fill={color}
                  stroke="var(--bg-card)"
                  strokeWidth="2"
                />
              )}
            </g>
          );
        })}

        {hoverIdx !== null && (
          <line
            x1={padL + hoverIdx * stepX} x2={padL + hoverIdx * stepX}
            y1={padT} y2={padT + innerH}
            stroke="var(--text-secondary)" strokeOpacity="0.3"
          />
        )}
      </svg>

      {hoverIdx !== null && (
        <div className="chart-readout">
          <div className="chart-readout-date">
            {new Date(days[hoverIdx] + "T00:00:00Z").toLocaleDateString("pt-BR", { weekday: "short", day: "2-digit", month: "long", timeZone: "UTC" })}
          </div>
          <div className="chart-readout-vals">
            {series.map((s) => (
              <div key={s.account_id} className="chart-readout-val">
                <span className="legend-swatch" style={{ background: colorFor(s.account_id) }} />
                <span className="chart-readout-name">{shortName(s.nome)}</span>
                <span className="chart-readout-num">{s.points[hoverIdx] != null ? fmt(s.points[hoverIdx]) : "—"}</span>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

  <script type="text/babel">
// ─────────────────────────────────────────────────────────────────────
// Supabase integration layer
// ─────────────────────────────────────────────────────────────────────
// Public surface (exposed on window):
//   useDashboardData()  → { accounts, daily, recs, creatives, clusters, config, setConfig, status, error, refresh, disconnect }
//   SupabaseSettings    → modal component for URL + anon key
//   getSupaConfig(), saveSupaConfig()
//
// Status values: "mock" | "loading" | "connected" | "error"
//
// Column mapping is defensive: alternative names are accepted (spend/gasto,
// impressoes/impressions, cliques/clicks, etc.). Adjust normalize* funcs
// below to match your exact schema if needed.

const SUPA_CONFIG_KEY = "supabase_config_v1";

// Backend base — production FastAPI on Vercel.
// Override via window.__API_BASE__ before this script tag if needed.
const API_BASE = (typeof window !== "undefined" && window.__API_BASE__)
  || "https://backend-psi-orpin-13.vercel.app";

function isBadConfigUrl(url) {
  if (!url) return true;
  if (url.startsWith("http://")) return true;
  if (/\/\/(localhost|127\.|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|0\.0\.0\.0)/.test(url)) return true;
  return false;
}

function getSupaConfig() {
  try {
    const stored = JSON.parse(localStorage.getItem(SUPA_CONFIG_KEY) || "{}") || {};
    // Auto-reset stale insecure configs from past dev sessions
    if (stored.url && isBadConfigUrl(stored.url)) {
      const fresh = { url: API_BASE, key: "backend" };
      try { localStorage.setItem(SUPA_CONFIG_KEY, JSON.stringify(fresh)); } catch {}
      return fresh;
    }
    if (stored.url || stored.key) return stored;
  } catch {}
  // Default: connect via backend
  return { url: API_BASE, key: "backend" };
}

function saveSupaConfig(cfg) {
  try {
    localStorage.setItem(SUPA_CONFIG_KEY, JSON.stringify(cfg || {}));
  } catch {}
}

// ─── Normalizers ─────────────────────────────────────────────────────
function n(v, def = 0) { const x = Number(v); return isNaN(x) ? def : x; }

function normalizeAccount(row) {
  return {
    account_id: row.account_id || row.id || row.act_id,
    nome: row.nome || row.name || row.account_name || row.conta || "—",
    regiao: row.regiao || row.region || row.uf || row.sigla || "—",
    meta_mensal: n(row.meta_mensal || row.monthly_target || row.budget_mensal || row.meta),
    budget_diario: n(row.budget_diario || row.budget_atual || row.daily_budget || row.budget),
    campanhas_ativas: n(row.campanhas_ativas || row.active_campaigns || row.num_campanhas, 0),
  };
}

function normalizeSnapshot(row) {
  const date = row.data || row.date || row.dia;
  return {
    data: typeof date === "string" ? date.slice(0, 10) : (date instanceof Date ? date.toISOString().slice(0, 10) : ""),
    account_id: row.account_id || row.act_id,
    regiao: row.regiao || row.region || "",
    spend: n(row.spend ?? row.gasto ?? row.investimento),
    impressoes: n(row.impressoes ?? row.impressions ?? row.imp),
    alcance: n(row.alcance ?? row.reach),
    cliques: n(row.cliques ?? row.clicks),
    eq: n(row.eq ?? row.engajamento_qualificado ?? row.qualified_engagement),
    leads: n(row.leads ?? row.conversions ?? row.conversoes),
    ctr: n(row.ctr),
    cpc: n(row.cpc),
    cpm: n(row.cpm),
    cpl: n(row.cpl),
    cpee: n(row.cpee),
  };
}

function normalizeRec(row) {
  const sev = (row.severidade || row.severity || "media").toLowerCase();
  return {
    id: row.id || row.rec_id,
    severidade: ["alta", "media", "baixa"].includes(sev) ? sev : "media",
    account_id: row.account_id || row.act_id,
    titulo: row.titulo || row.title || "—",
    descricao: row.descricao || row.description || "",
    impacto_estimado: row.impacto_estimado || row.impact || "—",
    confianca: n(row.confianca ?? row.confidence ?? 0.7, 0.7),
    criado_em: row.criado_em || row.created_at || new Date().toISOString(),
  };
}

function normalizeCreative(row) {
  const kindRaw = (row.pauta || row.thumb || row.tipo || row.creative_type || "EST").toUpperCase();
  const thumb = kindRaw.includes("VID") ? "video"
    : kindRaw.includes("CAR") ? "carousel"
    : kindRaw.includes("UGC") ? "ugc"
    : "static";
  // classificacao: QUENTE→winner, FRIO→loser, MORNO→stable
  const classif = (row.classificacao || row.status || "MORNO").toUpperCase();
  const status = classif.startsWith("Q") || classif === "WINNER" ? "winner"
    : classif.startsWith("F") || classif === "LOSER" ? "loser"
    : "stable";
  return {
    id: row.ad_id || row.id || row.creative_id,
    nome: row.ad_nome || row.nome || row.name || row.creative_name || "—",
    account_id: row.account_id || row.act_id,
    thumb,
    spend: n(row.spend ?? row.gasto),
    leads: n(row.leads ?? row.conversions),
    cpee: n(row.cpee),
    ctr: n(row.ctr),
    status,
    image_url: row.thumbnail_url || row.image_url || row.preview_url || null,
  };
}

function normalizeCluster(row) {
  const tipoRaw = (row.classificacao || row.tipo || row.classificacao_cpee || "").toString().toUpperCase();
  const tipo = tipoRaw.startsWith("Q") || tipoRaw === "HOT" ? "QUENTE"
    : tipoRaw.startsWith("M") || tipoRaw === "WARM" ? "MORNO"
    : tipoRaw.startsWith("F") || tipoRaw === "COLD" ? "FRIO"
    : "MORNO";
  const tendRaw = (row.tendencia || row.trend || "stable").toLowerCase();
  let tendencia = ["up", "alta"].includes(tendRaw) ? "up"
    : ["down", "queda", "baixa"].includes(tendRaw) ? "down"
    : "stable";
  if (tendencia === "stable" && n(row.cpee_7d) > 0 && n(row.cpee_30d) > 0) {
    const change = (n(row.cpee_7d) - n(row.cpee_30d)) / n(row.cpee_30d);
    tendencia = change > 0.1 ? "down" : change < -0.1 ? "up" : "stable";
  }
  return {
    id: row.adset_id || row.id || row.cluster_id,
    nome: row.cluster_nome || row.nome || row.name || row.cluster_name || "—",
    tipo,
    account_id: row.account_id,
    regiao: row.regiao || row.region || "—",
    cpee: n(row.cpee),
    spend: n(row.spend ?? row.gasto),
    eq: n(row.eq ?? row.engajamento_qualificado),
    leads: n(row.leads),
    ctr: n(row.ctr),
    alcance: n(row.alcance ?? row.reach),
    tendencia,
  };
}

// ─── Fetcher (BACKEND-FIRST, Supabase fallback) ───────────────────────
async function fetchFromBackend(baseUrl) {
  const url = `${baseUrl.replace(/\/$/, "")}/api/dashboard/data`;
  const res = await fetch(url, { headers: { "Accept": "application/json" } });
  if (!res.ok) {
    let detail;
    try { detail = (await res.json()).detail; } catch {}
    throw new Error(`Backend ${res.status}: ${detail || res.statusText}`);
  }
  const d = await res.json();
  const seen = new Set();
  const accounts = (d.accounts || [])
    .map(normalizeAccount)
    .filter(a => a.account_id && !seen.has(a.account_id) && seen.add(a.account_id));
  return {
    accounts,
    daily: (d.daily || []).map(normalizeSnapshot),
    recs: (d.recs || []).map(normalizeRec),
    creatives: (d.creatives || []).map(normalizeCreative),
    clusters: (d.clusters || []).map(normalizeCluster),
    warnings: [],
  };
}

async function fetchFromSupabase(client) {
  const queries = await Promise.allSettled([
    client.from("metricas_conta").select("*"),
    client.from("snapshots_diarios").select("*").order("data", { ascending: true }).limit(20000),
    client.from("recomendacoes").select("*").order("criado_em", { ascending: false }).limit(200),
    client.from("criativos_performance").select("*").order("spend", { ascending: false }).limit(50),
    client.from("clusters_performance").select("*").limit(200),
  ]);
  const [acctsR, snapsR, recsR, creatR, clustR] = queries;
  const acctsOk = acctsR.status === "fulfilled" && !acctsR.value.error;
  if (!acctsOk) {
    const msg = acctsR.status === "rejected"
      ? String(acctsR.reason)
      : (acctsR.value.error?.message || "Tabela metricas_conta não encontrada");
    throw new Error(msg);
  }
  const _rawAccounts = (acctsR.value.data || []).map(normalizeAccount);
  const _seenAccts = new Set();
  const accounts = _rawAccounts.filter(a => a.account_id && !_seenAccts.has(a.account_id) && _seenAccts.add(a.account_id));
  const pickData = (r) => (r.status === "fulfilled" && !r.value.error) ? (r.value.data || []) : [];
  const warnings = [];
  const checkWarn = (r, name) => {
    if (r.status === "rejected") warnings.push(`${name}: ${r.reason}`);
    else if (r.value.error) warnings.push(`${name}: ${r.value.error.message}`);
  };
  checkWarn(snapsR, "snapshots_diarios");
  checkWarn(recsR, "recomendacoes");
  checkWarn(creatR, "criativos_performance");
  checkWarn(clustR, "clusters_performance");
  return {
    accounts,
    daily: pickData(snapsR).map(normalizeSnapshot),
    recs: pickData(recsR).map(normalizeRec),
    creatives: pickData(creatR).map(normalizeCreative),
    clusters: pickData(clustR).map(normalizeCluster),
    warnings,
  };
}

// Top-level fetcher: decides between backend and Supabase based on config.
async function fetchAllData(config) {
  const usingBackend = !config.key || config.key === "backend"
    || /backend-psi-orpin|vercel\.app/.test(config.url || "");
  if (usingBackend) return fetchFromBackend(config.url || API_BASE);
  if (!window.supabase || !window.supabase.createClient) {
    throw new Error("SDK Supabase não está disponível (verifique se o script CDN carregou)");
  }
  const client = window.supabase.createClient(config.url, config.key, { auth: { persistSession: false } });
  return fetchFromSupabase(client);
}

// ─── React hook ──────────────────────────────────────────────────────
function useDashboardData() {
  const [config, setConfigState] = React.useState(getSupaConfig);
  const [status, setStatus] = React.useState("mock");
  const [error, setError] = React.useState(null);
  const [warnings, setWarnings] = React.useState([]);
  const [tick, setTick] = React.useState(0);
  const [liveData, setLiveData] = React.useState(null);

  const mockData = {
    accounts: window.ACCOUNTS,
    daily: window.DAILY,
    recs: window.RECOMENDACOES,
    creatives: window.CRIATIVOS,
    clusters: window.CLUSTERS,
  };

  const setConfig = (next) => {
    saveSupaConfig(next);
    setConfigState(next);
    setLiveData(null);
    setTick((x) => x + 1);
  };
  const disconnect = () => {
    setConfig({ url: "", key: "" });
    setStatus("mock");
    setError(null);
    setWarnings([]);
  };
  const refresh = () => setTick((x) => x + 1);

  React.useEffect(() => {
    if (!config.url) {
      setStatus("mock");
      setError(null);
      setWarnings([]);
      setLiveData(null);
      return;
    }
    let cancelled = false;
    setStatus("loading");
    setError(null);
    setWarnings([]);

    fetchAllData(config)
      .then((d) => {
        if (cancelled) return;
        // If accounts came back empty, treat as mock (tables may exist but have no data)
        if (!d.accounts || d.accounts.length === 0) {
          setLiveData(null);
          setStatus("mock");
          setWarnings(["Backend retornou 0 contas — exibindo dados de demonstração"]);
        } else {
          setLiveData(d);
          setStatus("connected");
          setWarnings(d.warnings || []);
        }
      })
      .catch((e) => {
        if (cancelled) return;
        setError(e.message || String(e));
        setStatus("error");
      });

    return () => { cancelled = true; };
  }, [config.url, config.key, tick]);

  // Pick which dataset to use
  const data = (status === "connected" && liveData) ? liveData : mockData;

  return {
    accounts: data.accounts || [],
    daily: data.daily || [],
    recs: data.recs || [],
    creatives: data.creatives || [],
    clusters: data.clusters || [],
    config,
    setConfig,
    disconnect,
    status,
    error,
    warnings,
    refresh,
  };
}

// ─── Settings Modal ──────────────────────────────────────────────────
function SupabaseSettings({ open, onClose, config, onSave, onDisconnect, status, error, warnings }) {

        <div className="modal-head">

          </div>
          <button className="modal-close" onClick={onClose}>✕</button>
        </div>

        <div className="modal-body">
          <div className="schema-hint" style={{ marginBottom: 12 }}>
            <div className="schema-hint-title">⚡ Modo recomendado: Backend</div>
            <div className="schema-hint-foot">
              Usa <code>{API_BASE}/api/dashboard/data</code> — 75 campanhas Meta Ads já sincronizadas no Supabase.
            </div>
            <div style={{ marginTop: 8 }}>
              <button className="btn-primary" onClick={handleUseBackend}>Usar Backend</button>
            </div>
          </div>

          <label className="field">
            <span className="field-label">Project URL (Supabase ou Backend)</span>
            <input
              type="url"
              className="field-input"
              placeholder="https://xxxxx.supabase.co"
              value={url}
              onChange={(e) => setUrl(e.target.value)}
              autoComplete="off"

          <label className="field">

              <button type="button" className="field-toggle" onClick={() => setShowKey(!showKey)}>

              value={key}

            />
          </label>

          <div className="schema-hint">
            <div className="schema-hint-title">Tabelas esperadas</div>
            <ul className="schema-list">
              <li><code>metricas_conta</code> · <em>obrigatória</em> — account_id, nome, regiao, meta_mensal, budget_diario</li>
              <li><code>snapshots_diarios</code> — data, account_id, spend, impressoes, alcance, cliques, eq, leads, cpee, ctr, cpc, cpm</li>
              <li><code>recomendacoes</code> — id, severidade, account_id, titulo, descricao, impacto_estimado, confianca, criado_em</li>
              <li><code>criativos_performance</code> — id, nome, account_id, thumb, spend, leads, cpee, ctr, status, image_url</li>
              <li><code>clusters_performance</code> — id, nome, tipo, account_id, regiao, cpee, spend, eq, leads, ctr, alcance, tendencia</li>

            <div className="schema-hint-foot">RLS deve permitir SELECT com a chave anon. Nomes alternativos (spend/gasto, clicks/cliques, etc.) são aceitos automaticamente.</div>

          <div style={{ marginLeft: "auto", display: "flex", gap: 6 }}>

            <button className="btn-primary" onClick={handleSave} disabled={!url}>Conectar</button>
          </div>
        </div>

}

  <script type="text/babel">
// ─────────────────────────────────────────────────────────────────────
// Meta Marketing API integration layer
// Token → validate → list adaccounts → fetch insights+creatives → upsert Supabase
// ─────────────────────────────────────────────────────────────────────

const META_CONFIG_KEY = "meta_config_v1";
const META_BASE = "https://graph.facebook.com/v20.0";

function getMetaConfig() {
  try { return JSON.parse(localStorage.getItem(META_CONFIG_KEY) || "{}"); } catch { return {}; }
}
function saveMetaConfig(cfg) {
  try { localStorage.setItem(META_CONFIG_KEY, JSON.stringify(cfg)); } catch {}
}

// ─── Low-level fetch ──────────────────────────────────────────────────
async function metaFetch(path, params, token) {
  const url = new URL(`${META_BASE}/${path.replace(/^\//, "")}`);
  url.searchParams.set("access_token", token);
  Object.entries(params || {}).forEach(([k, v]) =>
    url.searchParams.set(k, typeof v === "object" ? JSON.stringify(v) : String(v))
  );
  const res = await fetch(url.toString());
  const json = await res.json();
  if (json.error) {
    const e = json.error;
    throw new Error(`Meta API [${e.code}]: ${e.message}`);
  }
  return json;
}

// auto-paginate through all pages (up to 10 k rows)
async function metaFetchAll(path, params, token) {
  const out = [];
  let data = await metaFetch(path, { ...params, limit: 500 }, token);
  if (Array.isArray(data.data)) out.push(...data.data);
  while (data.paging?.next && out.length < 10000) {
    const next = new URL(data.paging.next);
    const p = {};
    next.searchParams.forEach((v, k) => { if (k !== "access_token") p[k] = v; });
    data = await metaFetch(path, p, token);
    if (Array.isArray(data.data)) out.push(...data.data);
  }
  return out;
}

// ─── Validate token ───────────────────────────────────────────────────
async function validateMetaToken(token) {
  return metaFetch("me", { fields: "id,name" }, token);
}

// ─── Fetch ad accounts ────────────────────────────────────────────────
async function fetchAdAccounts(token) {
  const data = await metaFetch("me/adaccounts", {
    fields: "id,name,account_id,account_status,currency,timezone_name,amount_spent,spend_cap",
    limit: 100,
  }, token);
  // status 1 = ACTIVE
  return (data.data || []).filter(a => Number(a.account_status) === 1);
}

// ─── Fetch daily insights ─────────────────────────────────────────────
async function fetchInsights(accountId, since, until, token, eqAction) {
  const fields = [
    "spend", "impressions", "reach", "clicks", "ctr", "cpm", "cpc",
    "actions", "date_start", "date_stop",
  ].join(",");

  const rows = await metaFetchAll(`${accountId}/insights`, {
    fields,
    time_increment: 1,
    time_range: { since, until },
    level: "account",
  }, token);

  return rows.map(r => {
    const actions = Array.isArray(r.actions) ? r.actions : [];
    const getAction = (type) => {
      const found = actions.find(a => a.action_type === type);
      return found ? parseFloat(found.value || "0") : 0;
    };
    const spend = parseFloat(r.spend || 0);
    const eq = getAction(eqAction);
    const leads = getAction("lead") || getAction("offsite_conversion.fb_pixel_lead") || eq;
    const cpee = eq > 0 ? spend / eq : 0;
    return {
      data: r.date_start,
      account_id: accountId,
      spend,
      impressoes: parseInt(r.impressions || 0, 10),
      alcance: parseInt(r.reach || 0, 10),
      cliques: parseInt(r.clicks || 0, 10),
      ctr: parseFloat(r.ctr || 0),
      cpc: parseFloat(r.cpc || 0),
      cpm: parseFloat(r.cpm || 0),
      eq,
      leads,
      cpee,
      cpl: leads > 0 ? spend / leads : 0,
    };
  });
}

// ─── Fetch ad creatives ───────────────────────────────────────────────
async function fetchCreatives(accountId, since, until, token, eqAction) {
  let rows;
  try {
    rows = await metaFetchAll(`${accountId}/ads`, {
      fields: [
        "id", "name", "status",
        "creative{id,thumbnail_url,image_url,video_id,title,body}",
        `insights.date_preset(last_30d){spend,ctr,impressions,cpc,cpm,actions}`,
      ].join(","),
      effective_status: ["ACTIVE", "PAUSED"],
    }, token);
  } catch {
    return []; // creatives are non-critical
  }

  return rows.map(row => {
    const ins = row.insights?.data?.[0] || {};
    const spend = parseFloat(ins.spend || 0);
    const actions = Array.isArray(ins.actions) ? ins.actions : [];
    const getAction = (type) => {
      const f = actions.find(a => a.action_type === type);
      return f ? parseFloat(f.value || "0") : 0;
    };
    const eq = getAction(eqAction);
    const leads = getAction("lead") || getAction("offsite_conversion.fb_pixel_lead") || eq;
    const cpee = eq > 0 ? spend / eq : 0;
    const creative = row.creative || {};
    const imageUrl = creative.thumbnail_url || creative.image_url || null;
    const isVideo = !!creative.video_id;
    const thumb = isVideo ? "video" : "static";
    const status = cpee > 0 && cpee <= 27 ? "winner" : cpee > 35 ? "loser" : "stable";
    return {
      id: row.id,
      nome: row.name || row.id,
      account_id: accountId,
      thumb,
      spend,
      leads,
      cpee,
      ctr: parseFloat(ins.ctr || 0),
      status,
      image_url: imageUrl,
    };
  }).filter(c => c.spend > 0 || c.id);
}

// ─── Upsert to Supabase ───────────────────────────────────────────────
async function upsertToSupabase(client, { accountRows, snapshots, creatives }, onProgress) {
  const errors = [];
  let accountsUpserted = 0, snapshotsUpserted = 0, creativesUpserted = 0;

  if (accountRows.length > 0) {
    onProgress("Salvando metricas_conta…");
    const { error } = await client
      .from("metricas_conta")
      .upsert(accountRows, { onConflict: "account_id" });
    if (error) errors.push(`metricas_conta: ${error.message}`);
    else accountsUpserted = accountRows.length;
  }

  if (snapshots.length > 0) {
    const CHUNK = 500;
    for (let i = 0; i < snapshots.length; i += CHUNK) {
      const chunk = snapshots.slice(i, i + CHUNK);
      onProgress(`Snapshots: ${Math.min(i + CHUNK, snapshots.length)} / ${snapshots.length}`);
      const { error } = await client
        .from("snapshots_diarios")
        .upsert(chunk, { onConflict: "data,account_id" });
      if (error) {
        errors.push(`snapshots_diarios (bloco ${Math.floor(i / CHUNK) + 1}): ${error.message}`);
        // first chunk fail = likely missing constraint — warn once
        if (i === 0) break;
      } else {
        snapshotsUpserted += chunk.length;
      }
    }
  }

  if (creatives.length > 0) {
    onProgress(`Salvando ${creatives.length} criativos…`);
    const { error } = await client
      .from("criativos_performance")
      .upsert(creatives, { onConflict: "id" });
    if (error) errors.push(`criativos_performance: ${error.message}`);
    else creativesUpserted = creatives.length;
  }

  return { accountsUpserted, snapshotsUpserted, creativesUpserted, errors };
}

// ─── useMetaImport hook ───────────────────────────────────────────────
function useMetaImport(supabaseClient) {
  const saved = getMetaConfig();
  const [step, setStep] = React.useState(0);
  const [token, setToken] = React.useState(saved.token || "");
  const [showToken, setShowToken] = React.useState(false);
  const [eqAction, setEqAction] = React.useState(saved.eqAction || "lead");
  const [since, setSince] = React.useState("2026-01-01");
  const [until, setUntil] = React.useState("2026-05-17");
  const [metaAccounts, setMetaAccounts] = React.useState([]);
  const [selected, setSelected] = React.useState([]);
  const [loading, setLoading] = React.useState(false);
  const [log, setLog] = React.useState([]);
  const [progress, setProgress] = React.useState("");
  const [results, setResults] = React.useState(null);
  const [error, setError] = React.useState(null);

  const addLog = (msg) =>
    setLog(prev => [...prev, { t: new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", second: "2-digit" }), msg }]);

  const validateToken = async () => {
    setLoading(true); setError(null);
    try {
      addLog("Validando token…");
      const me = await validateMetaToken(token);
      addLog(`✓ Token válido — ${me.name} (${me.id})`);
      const accts = await fetchAdAccounts(token);
      addLog(`✓ ${accts.length} conta(s) ativa(s) encontrada(s)`);
      saveMetaConfig({ token, eqAction });
      setMetaAccounts(accts);
      setSelected(accts.map(a => a.id));
      setStep(1);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  const runImport = async () => {
    if (!supabaseClient) { setError("Conecte ao Supabase antes de importar"); return; }
    setStep(2); setLog([]); setResults(null); setError(null);
    const allSnapshots = [], allCreatives = [], accountRows = [];
    try {
      for (const accId of selected) {
        const acc = metaAccounts.find(a => a.id === accId);
        const label = acc?.name || accId;
        addLog(`Buscando insights: ${label}`);
        setProgress(`Insights · ${label}`);
        const snaps = await fetchInsights(accId, since, until, token, eqAction);
        allSnapshots.push(...snaps);
        addLog(`  ✓ ${snaps.length} dias`);

        // build metricas_conta row from period totals
        const totalSpend = snaps.reduce((s, r) => s + r.spend, 0);
        const totalEq    = snaps.reduce((s, r) => s + r.eq, 0);
        const totalLeads = snaps.reduce((s, r) => s + r.leads, 0);
        const cpee = totalEq > 0 ? totalSpend / totalEq : 0;
        accountRows.push({
          account_id: accId,
          nome: label,
          regiao: "—",
          meta_mensal: 0,
          budget_diario: 0,
          campanhas_ativas: 0,
          cpee,
          classificacao_cpee: classifyCpee(cpee),
          spend: totalSpend,
          leads: totalLeads,
          eq: totalEq,
          executado_em: new Date().toISOString(),
        });

        addLog(`Buscando criativos: ${label}`);
        setProgress(`Criativos · ${label}`);
        const crs = await fetchCreatives(accId, since, until, token, eqAction);
        allCreatives.push(...crs);
        addLog(`  ✓ ${crs.length} criativos`);
      }

      setProgress("Salvando no Supabase…");
      addLog("Salvando no Supabase…");
      const res = await upsertToSupabase(
        supabaseClient,
        { accountRows, snapshots: allSnapshots, creatives: allCreatives },
        (msg) => { setProgress(msg); addLog(msg); }
      );
      res.errors.forEach(e => addLog(`⚠ ${e}`));
      addLog("✓ Importação concluída");
      setResults(res);
      setStep(3);
    } catch (e) {
      addLog(`✗ ${e.message}`);
      setError(e.message);
    }
  };

  const reset = () => { setStep(0); setError(null); setLog([]); setResults(null); };

  return {
    step, setStep, token, setToken, showToken, setShowToken,
    eqAction, setEqAction, since, setSince, until, setUntil,
    metaAccounts, selected, setSelected,
    loading, log, progress, results, error,
    validateToken, runImport, reset,
  };
}

            onChange={(e) => setDraft(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") commit(); if (e.key === "Escape") { setDraft(String(teto)); setEditing(false); } }} />
          <button className="btn-primary" onClick={commit} style={{ fontSize: 11, padding: "3px 8px" }}>Salvar</button>
          <button className="btn-ghost" onClick={() => { setDraft(String(teto)); setEditing(false); }} style={{ fontSize: 11, padding: "3px 8px" }}>✕</button>
        </div>
      ) : (
        <div className={`bmc-value bmc-value-${color}`}>{BRL(spend)}</div>
      )}
      <div className="bmc-track">
        <div className={`bmc-fill bmc-fill-${color}`} style={{ width: `${(pct * 100).toFixed(1)}%` }} />
      </div>
      {sub && <div className="bmc-sub">{sub}</div>}
      {extraLine && <div className="bmc-extra">{extraLine}</div>}
    </div>
  );
}

function PhotoOrInitials({ foto, initials, nome }) {
  const [failed, setFailed] = React.useState(false);
  if (foto && !failed) {
    return (
      <div className="candidate-photo">
        <img src={foto} alt={nome} onError={() => setFailed(true)} />
      </div>
    );
  }
  return (
    <div className="candidate-photo">
      <span className="candidate-initials">{initials || "?"}</span>
    </div>
  );
}

function CandidateHero({ spend, periodLabel, teto, onEditTeto, monthly, onEditMonthly, pvd, now, onOpenSettings, status }) {
  const c = CANDIDATO;
  const diasEleicao = Math.max(0, Math.floor((new Date(c.eleicao) - now) / 86400000));

  const monthPct   = monthly.progress;
  const monthColor = metaBudgetColor(monthPct);
  const pacing     = monthly.progress - monthly.expected;
  const pacingLbl  = Math.abs(pacing) < 0.08 ? "No ritmo" : pacing > 0.08 ? "Acima do esperado" : "Abaixo do esperado";

  return (
    <div className="candidate-hero">
      {/* Left: candidate info */}
      <div className="candidate-info">
        <PhotoOrInitials foto={c.foto} initials={c.initials} nome={c.nome} />
        <div className="candidate-text">
          <div className="candidate-name">{c.nome}</div>
          <div className="candidate-sub">{c.partido} · Número {c.numero} · {c.estado}</div>
          <a className="candidate-site" href={`https://${c.site}`} target="_blank" rel="noopener noreferrer">{c.site}</a>
        </div>
        <button className={`cand-conn-pill conn-pill-${status}`} onClick={onOpenSettings} title="Configurar Supabase">
          <span className="conn-dot" />
          <span>{{ mock: "Mock", loading: "Carregando…", connected: "Conectado", error: "Erro" }[status] || "Mock"}</span>
        </button>
      </div>

      {/* Right: meta cards */}
      <div className="candidate-metas">
        <BudgetMetaCard
          label={`GASTO ${c.fase.toUpperCase()} · ${periodLabel}`}
          spend={spend}
          teto={teto}
          onEditTeto={onEditTeto}
          sub={`${(Math.min(teto > 0 ? spend / teto : 0, 1) * 100).toFixed(1)}% do teto ${BRL(teto)}`}
        />
        <BudgetMetaCard
          label="BUDGET MENSAL"
          spend={monthly.spend}
          teto={monthly.meta}
          onEditTeto={onEditMonthly}
          badge={pacingLbl}
          badgeVariant={monthColor}
          sub={`${BRL(monthly.spend)} consumido · ${(monthPct * 100).toFixed(1)}% do mês`}
          extraLine={`Esperado: ${(monthly.expected * 100).toFixed(1)}% · ${pacing >= 0 ? "+" : ""}${(pacing * 100).toFixed(1)} p.p.`}
        />
      </div>

      {/* Bottom: stats row */}
      <div className="candidate-stats">
        <div className="cstat">
          <div className="cstat-label">PVD ATUAL</div>
          <div className="cstat-value cstat-blue">{NUM(pvd)}</div>
        </div>
        <div className="cstat-sep" />
        <div className="cstat">
          <div className="cstat-label">DIAS ATÉ ELEIÇÃO</div>
          <div className={`cstat-value ${diasEleicao < 30 ? "cstat-red" : "cstat-yellow"}`}>{diasEleicao}</div>
        </div>
        <div className="cstat-sep" />
        <div className="cstat">
          <div className="cstat-label">FASE</div>
          <div className="cstat-pill">{c.fase}</div>
        </div>
      </div>
    </div>
  );
}

function Dashboard() {
  const [t, setTweak] = useTweaks({
    accent_hot: "#EF4444",
    accent_warm: "#F59E0B",
    accent_cold: "#3B82F6",
    accent_success: "#10B981",
    bg_tone: "navy",
    display_font: "Space Grotesk",
    body_font: "Inter",
    density: "comfortable",
    show_creatives: true,
  });

  // Data source: mocks or Supabase
  const dataSource = useDashboardData();
  const { accounts, daily, recs, creatives, clusters, status, config, setConfig, disconnect, refresh: refreshData, error, warnings } = dataSource;
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [metaImportOpen, setMetaImportOpen] = useState(false);
  const supabaseClient = useMemo(() => getSupabaseClient(), [config]);

  const [liveOn, setLiveOn] = useState(true);
  const [countdown, setCountdown] = useState(300);
  const [periodId, setPeriodId] = useState("14d");
  const [customRange, setCustomRange] = useState({ start: "2026-04-01", end: "2026-05-14" });
  const [selectedAccount, setSelectedAccount] = useState(null);
  const [chartMetric, setChartMetric] = useState("cpee");
  const [refreshing, setRefreshing] = useState(false);
  const [now, setNow] = useState(new Date("2026-05-14T14:32:00"));
  const [appliedRecs, setAppliedRecs] = useState(new Set());
  const [dismissedRecs, setDismissedRecs] = useState(new Set());

  // editable monthly meta (overrides per account; null = use default from ACCOUNTS)
  const [metaOverrides, setMetaOverrides] = useState(() => {
    try { return JSON.parse(localStorage.getItem("meta_overrides") || "{}"); }
    catch { return {}; }
  });
  const saveMeta = (val) => {
    const key = selectedAccount || "__consolidated";
    const next = { ...metaOverrides, [key]: val };
    setMetaOverrides(next);
    try { localStorage.setItem("meta_overrides", JSON.stringify(next)); } catch {}
  };

  const currentRange = useMemo(
    () => rangeFromPreset(periodId, customRange.start, customRange.end),
    [periodId, customRange]
  );

  const agg = useMemo(
    () => aggregate(daily, accounts, currentRange.start, currentRange.end, selectedAccount),
    [daily, accounts, currentRange.start, currentRange.end, selectedAccount]
  );

  // apply meta override if set; align spend with selected period (consistent with hero + breakdown)
  const monthlyWithOverride = useMemo(() => {
    const key = selectedAccount || "__consolidated";
    const override = metaOverrides[key];
    const meta = override || agg.monthly.meta;
    // Use period spend (agg.totals.spend) so all three cards — Gasto no período,
    // Gasto por conta e Meta mensal — mostram o mesmo número de gasto.
    const spend = agg.totals.spend;
    return {
      ...agg.monthly,
      meta,
      spend,
      progress: meta > 0 ? spend / meta : 0,
    };
  }, [agg.monthly, agg.totals.spend, metaOverrides, selectedAccount]);

  // auto-refresh: countdown 5 min, refreshes Supabase data at zero
  useEffect(() => {
    if (!liveOn) return;
    setCountdown(300);
    const id = setInterval(() => {
      setCountdown((c) => {
        if (c <= 1) {
          refreshData();
          setNow(new Date());
          return 300;
        }
        return c - 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [liveOn]);

  const handleRefresh = () => {
    setRefreshing(true);
    setTimeout(() => {
      setRefreshing(false);
      setNow(new Date(now.getTime() + 30000));
    }, 700);
  };

  // "Hoje" KPIs always show today (or the most recent date in dataset)
  const todayAgg = useMemo(() => {
    const mostRecent = daily.length > 0
      ? daily.reduce((m, r) => r.data > m ? r.data : m, "0000-00-00")
      : "2026-05-14";
    return aggregate(daily, accounts, mostRecent, mostRecent);
  }, [daily, accounts]);
  const totalBudgetDiario = accounts.reduce((a, b) => a + (b.budget_diario || 0), 0);

  // Teto pré-campanha — editável, persistido em localStorage
  const [tetoOverride, setTetoOverride] = useState(() => {
    try { return parseFloat(localStorage.getItem("teto_precampanha") || "0") || CANDIDATO.teto_precampanha; }
    catch { return CANDIDATO.teto_precampanha; }
  });
  const saveTeto = (v) => { setTetoOverride(v); try { localStorage.setItem("teto_precampanha", String(v)); } catch {} };

  // Period label for the hero card
  const periodLabel = useMemo(() => {
    const labels = { "7d": "7 DIAS", "14d": "14 DIAS", "30d": "30 DIAS", "60d": "60 DIAS", "90d": "90 DIAS", month: "MÊS ATUAL", ytd: "DESDE JAN" };
    if (labels[periodId]) return labels[periodId];
    const days = daysBetween(currentRange.start, currentRange.end) + 1;
    return `${days} DIAS`;
  }, [periodId, currentRange]);

  // PVD = cumulative EQ across all data
  const pvdTotal = useMemo(() => daily.reduce((s, d) => s + (d.eq || 0), 0), [daily]);

  const visibleRecs = recs.filter((r) => !dismissedRecs.has(r.id));
  const pendingCount = visibleRecs.filter((r) => !appliedRecs.has(r.id)).length;
  const acctName = (id) => accounts.find((a) => a.account_id === id)?.nome || id;
  const lastUpdateStr = now.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });

  // CPEE classification status for top KPI
  const cpeeKind = agg.totals.classificacao_cpee;
  const cpeeAccent = cpeeKind === "HOT" ? "var(--accent-success)" : cpeeKind === "WARM" ? "var(--accent-warm)" : "var(--accent-hot)";

  // monthly status variant
  const pacing = agg.monthly.progress - agg.monthly.expected;
  const monthVariant = Math.abs(pacing) < 0.08 ? "ok" : pacing > 0.08 ? "over" : "under";

  // apply tweaks to CSS vars
  useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty("--accent-hot", t.accent_hot);
    r.style.setProperty("--accent-warm", t.accent_warm);
    r.style.setProperty("--accent-cold", t.accent_cold);
    r.style.setProperty("--accent-success", t.accent_success);
    document.body.dataset.tone = t.bg_tone;
    document.body.dataset.density = t.density;
    r.style.setProperty("--font-display", `"${t.display_font}", system-ui, sans-serif`);
    r.style.setProperty("--font-body", `"${t.body_font}", system-ui, sans-serif`);
  }, [t]);

  return (
    <div className="dashboard-container">
      <Header
        liveOn={liveOn}
        setLiveOn={(v) => { setLiveOn(v); setCountdown(300); }}
        lastUpdate={lastUpdateStr}
        onRefresh={() => { handleRefresh(); refreshData(); setCountdown(300); }}
        refreshing={refreshing}
        status={status}
        onOpenSettings={() => setSettingsOpen(true)}
        onOpenMeta={() => setMetaImportOpen(true)}
        countdown={countdown}
      />

      <CandidateHero
        spend={agg.totals.spend}
        periodLabel={periodLabel}
        teto={tetoOverride}
        onEditTeto={saveTeto}
        monthly={monthlyWithOverride}
        onEditMonthly={saveMeta}
        pvd={pvdTotal}
        now={now}
        onOpenSettings={() => setSettingsOpen(true)}
        status={status}
      />

      <MetaImportModal
        open={metaImportOpen}
        onClose={() => setMetaImportOpen(false)}
        supabaseClient={supabaseClient}
        onImportDone={() => { refreshData(); setMetaImportOpen(false); }}
      />

      <SupabaseSettings
        open={settingsOpen}
        onClose={() => setSettingsOpen(false)}
        config={config}
        onSave={(c) => { setConfig(c); }}
        onDisconnect={() => { disconnect(); setSettingsOpen(false); }}
        status={status}
        error={error}
        warnings={warnings}
      />

      <PeriodSelector
        value={periodId}
        onChange={setPeriodId}
        customRange={customRange}
        onCustomChange={setCustomRange}
        currentRange={currentRange}
      />

      <AlertBanner count={pendingCount} onClick={() => {
        const el = document.getElementById("recs-section");
        if (el) {
          const top = el.getBoundingClientRect().top + window.scrollY - 24;
          window.scrollTo({ top, behavior: "smooth" });
        }
      }} />

      {/* Hero row — spend + monthly meta progress */}
      <section className="hero-grid" data-screen-label="01 Visão geral">
        <div className="card hero-spend">
          <div className="hero-spend-left">
            <div className="kpi-label">Gasto no período</div>
            <div className="hero-spend-value">{BRL(agg.totals.spend)}</div>
            <div className="hero-spend-foot">
              <Delta value={agg.deltas.spend} />
              <span className="kpi-hint">vs. período anterior</span>
            </div>
          </div>
          <div className="hero-spend-right">
            <Sparkline values={agg.dailySeries.map((d) => d.spend)} accent="var(--accent-cold)" height={56} width={220} />
          </div>
        </div>

        <MonthlyMetaCard
          monthly={monthlyWithOverride}
          label={selectedAccount ? `Meta mensal · ${acctName(selectedAccount).split("·")[1]?.trim() || ""}` : "Meta mensal consolidada"}
          onEditMeta={saveMeta}
        />

        <SpendBreakdown perAccount={agg.perAccount} total={agg.totals.spend} />
      </section>

      {/* KPI Grid — row 1 (4 cards) */}
      <section className="kpi-grid kpi-grid-4" data-screen-label="02 KPIs principais">
        <KpiCard
          label="CPEE CONSOLIDADO"
          value={BRLfine(agg.totals.cpee)}
          sub={`Classificação · ${cpeeKind}`}
          icon={Icon.flame}
          iconColor={cpeeAccent}
        />
        <KpiCard
          label="GASTO HOJE"
          value={BRL(todayAgg.totals.spend)}
          sub={`${(todayAgg.totals.spend / totalBudgetDiario * 100).toFixed(0)}% do budget diário`}
          icon={Icon.money}
          iconColor="var(--accent-success)"
        />
        <KpiCard
          label="BUDGET DIÁRIO"
          value={BRL(totalBudgetDiario)}
          sub={`Soma das ${accounts.length} contas`}
          icon={Icon.budget}
          iconColor="var(--accent-cold)"
        />
        <KpiCard
          label="ALERTAS PENDENTES"
          value={pendingCount}
          sub="Recomendações não aprovadas"
          icon={Icon.alert}
          iconColor={pendingCount > 0 ? "var(--accent-warm)" : "var(--text-tertiary)"}
        />
      </section>

      {/* KPI Grid — row 2 (6 cards) */}
      <section className="kpi-grid kpi-grid-6">
        <KpiCard
          label="IMPRESSÕES"
          value={NUMcompact(agg.totals.impressoes)}
          sub={NUM(agg.totals.impressoes) + " total"}
          icon={Icon.eye}
          iconColor="var(--accent-cold)"
        />
        <KpiCard
          label="ALCANCE"
          value={NUMcompact(agg.totals.alcance)}
          sub="Pessoas únicas"
          icon={Icon.users}
          iconColor="#F59E0B"
        />
        <KpiCard
          label="FREQUÊNCIA"
          value={`${agg.totals.frequencia.toFixed(2)}×`}
          sub="Impressões / alcance"
          icon={Icon.refresh}
          iconColor="#EC4899"
        />
        <KpiCard
          label="CTR MÉDIO"
          value={`${agg.totals.ctr.toFixed(2)}%`}
          sub={`CPC ${BRLfine(agg.totals.cpc)}`}
          icon={Icon.target}
          iconColor="#F97316"
        />
        <KpiCard
          label="LEADS"
          value={NUM(agg.totals.leads)}
          sub={`CPL ${BRLfine(agg.totals.cpl)}`}
          icon={Icon.leads}
          iconColor="var(--accent-success)"
        />
        <KpiCard
          label="EQ TOTAL"
          value={NUM(agg.totals.eq)}
          sub="Engajamento Qualificado"
          icon={Icon.spark}
          iconColor="#EF4444"
        />
      </section>

      {/* Distribuição + Classificação + Funil */}
      <section className="triple-grid" data-screen-label="03 Distribuição + Classificação + Funil">
        <DistribuicaoCpee cpee={agg.totals.cpee} target={28} warmRange={4} />
        <ClassificacaoCpee perAccount={agg.perAccount} />
        <FunilConversao totals={agg.totals} />
      </section>

      {/* Main grid: table + chart */}
      <section className="main-grid" data-screen-label="04 Performance">
        <div className="main-left">
          <PerformanceTable
            data={agg.perAccount}
            onSelect={(id) => setSelectedAccount(selectedAccount === id ? null : id)}
            selectedId={selectedAccount}
          />
        </div>
        <div className="main-right">
          <div className="chart-meta-toggle">
            <button className={`pill ${chartMetric === "cpee" ? "active" : ""}`} onClick={() => setChartMetric("cpee")}>CPEE</button>
            <button className={`pill ${chartMetric === "spend" ? "active" : ""}`} onClick={() => setChartMetric("spend")}>Gasto</button>
            <button className={`pill ${chartMetric === "eq" ? "active" : ""}`} onClick={() => setChartMetric("eq")}>EQ</button>
            <button className={`pill ${chartMetric === "leads" ? "active" : ""}`} onClick={() => setChartMetric("leads")}>Leads</button>
            <button className={`pill ${chartMetric === "impressoes" ? "active" : ""}`} onClick={() => setChartMetric("impressoes")}>Impressões</button>
          </div>
          <TrendChart
            dailySeries={agg.dailySeries}
            metric={chartMetric}
            accounts={accounts}
            selectedAccount={selectedAccount}
          />
        </div>
      </section>

      {/* Criativos — 5 por categoria */}
      {t.show_creatives && (() => {
        const byStatus = (s) => creatives.filter(c => c.status === s).sort((a, b) => b.spend - a.spend).slice(0, 5);
        const winners = byStatus("winner");
        const stable  = byStatus("stable");
        const losers  = byStatus("loser");
        const groups  = [
          { key: "winner", label: "Winners", color: "var(--accent-success)", items: winners },
          { key: "stable", label: "Stable",  color: "var(--accent-warm)",   items: stable },
          { key: "loser",  label: "Losers",  color: "var(--accent-hot)",    items: losers },
        ];
        return (
          <section className="card-section" data-screen-label="05 Criativos">
            {groups.map(({ key, label, color, items }) => (
              <div key={key} className="card creatives-card" style={{ marginBottom: 12 }}>
                <div className="card-head">
                  <div>
                    <h3 className="card-title" style={{ color }}>
                      {label} · top {items.length}
                    </h3>
                    <p className="card-sub">
                      {key === "winner" ? "CPEE abaixo da média · escalar" : key === "stable" ? "CPEE próximo da média · monitorar" : "CPEE acima da média · revisar"}
                    </p>
                  </div>
                </div>
                {items.length > 0 ? (
                  <div className="creatives-list creatives-list-grid">
                    {items.map((c) => (
                      <CreativeRow key={c.id} c={c} accountName={acctName(c.account_id)} />
                    ))}
                  </div>
                ) : (
                  <div className="empty">Nenhum criativo nesta categoria</div>
                )}
              </div>
            ))}
          </section>
        );
      })()}

      {/* Clusters de audiência */}
      <section className="card-section" data-screen-label="06 Clusters">
        <ClustersPanel clusters={clusters} accounts={accounts} />
      </section>

      {/* Recomendações */}
      <section className="card-section" data-screen-label="07 Recomendações">
        <div className="card recs-card" id="recs-section">
          <div className="card-head">
            <div>
              <h3 className="card-title">Recomendações automáticas</h3>
              <p className="card-sub">{pendingCount} pendentes · IA · atualizado às {lastUpdateStr.slice(0, 5)}</p>
            </div>
          </div>
          <div className="recs-list">
            {visibleRecs.map((rec) => (
              <RecommendationCard
                key={rec.id}
                rec={rec}
                accountName={acctName(rec.account_id)}
                applied={appliedRecs.has(rec.id)}
                onApply={() => setAppliedRecs(new Set([...appliedRecs, rec.id]))}
                onDismiss={() => setDismissedRecs(new Set([...dismissedRecs, rec.id]))}
              />
            ))}
            {visibleRecs.length === 0 && (
              <div className="empty">Nenhuma recomendação pendente · contas operando dentro das metas</div>
            )}
          </div>
        </div>
      </section>

      <footer className="dash-footer">
        <span>CPEE Dashboard · v2.6</span>
        <span>·</span>
        <span>Conectado · Supabase realtime</span>
        <span>·</span>
        <span>Polling 30s</span>
        <span>·</span>
        <span>Dados de mock para preview · 2026-05-14</span>
      </footer>

      <TweaksPanel>
        <TweakSection label="Tema">
          <TweakRadio
            label="Background"
            value={t.bg_tone}
            onChange={(v) => setTweak("bg_tone", v)}
            options={["navy", "graphite", "midnight"]}
          />
          <TweakRadio
            label="Densidade"
            value={t.density}
            onChange={(v) => setTweak("density", v)}
            options={["comfortable", "compact"]}
          />
        </TweakSection>
        <TweakSection label="Acentos">
          <TweakColor label="Hot" value={t.accent_hot}
            onChange={(v) => setTweak("accent_hot", v)}
            options={["#EF4444", "#F43F5E", "#DC2626", "#F97316"]} />
          <TweakColor label="Warm" value={t.accent_warm}
            onChange={(v) => setTweak("accent_warm", v)}
            options={["#F59E0B", "#FBBF24", "#EAB308", "#F97316"]} />
          <TweakColor label="Cold" value={t.accent_cold}
            onChange={(v) => setTweak("accent_cold", v)}
            options={["#3B82F6", "#6366F1", "#0EA5E9", "#8B5CF6"]} />
          <TweakColor label="Success" value={t.accent_success}
            onChange={(v) => setTweak("accent_success", v)}
            options={["#10B981", "#22C55E", "#14B8A6", "#84CC16"]} />
        </TweakSection>
        <TweakSection label="Tipografia">
          <TweakSelect label="Display" value={t.display_font}
            onChange={(v) => setTweak("display_font", v)}
            options={["Space Grotesk", "Inter", "IBM Plex Sans", "JetBrains Mono"]} />
          <TweakSelect label="Body" value={t.body_font}
            onChange={(v) => setTweak("body_font", v)}
            options={["Inter", "IBM Plex Sans", "Space Grotesk"]} />
        </TweakSection>
        <TweakSection label="Layout">
          <TweakToggle label="Painel de criativos"
            value={t.show_creatives}
            onChange={(v) => setTweak("show_creatives", v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);

  </script>

</body>
</html>
